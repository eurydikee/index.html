<!DOCTYPE html>
<html>
<head>
<title>Emerlin</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial, sans-serif;
}

canvas{
position:absolute;
}

.centerText{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:#ff6ec7;
text-shadow:0 0 20px #ff6ec7,0 0 40px #ff6ec7;
pointer-events:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="centerText">Emerlin</div>
<canvas id="heart"></canvas>

<script>

const canvas = document.getElementById("heart");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let particles = [];
let sparkles = [];

function heartShape(t){
let x = 16*Math.pow(Math.sin(t),3);
let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
return {x:x,y:y};
}

for(let i=0;i<900;i++){

let t = Math.random()*Math.PI*2;
let pos = heartShape(t);

particles.push({
baseX:pos.x,
baseY:pos.y,
size:Math.random()*10+10,
offset:Math.random()*100
});

}

let time = 0;

canvas.addEventListener("click",function(e){

for(let i=0;i<80;i++){

sparkles.push({
x:e.clientX,
y:e.clientY,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:60
});

}

});

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

time+=0.03;

for(let p of particles){

let pulse = 20 + Math.sin(time + p.offset)*6;

let x = canvas.width/2 + p.baseX*pulse;
let y = canvas.height/2 - p.baseY*pulse;

ctx.fillStyle="#ff6ec7";
ctx.shadowBlur=20;
ctx.shadowColor="#ff6ec7";
ctx.font=p.size+"px Arial";

ctx.fillText("emerlin",x,y);

}

for(let i=sparkles.length-1;i>=0;i--){

let s=sparkles[i];

ctx.fillStyle="white";
ctx.shadowBlur=10;
ctx.shadowColor="white";
ctx.fillRect(s.x,s.y,2,2);

s.x+=s.vx;
s.y+=s.vy;
s.life--;

if(s.life<=0){
sparkles.splice(i,1);
}

}

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
